<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Audio Player</title>
	<link rel="stylesheet" href="assets/css/reset.css">
	<link rel="stylesheet" href="assets/css/styles.css">
	<link rel="icon" href="favicon.ico" type="image/x-icon">
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
	<div class="root">
		<h1>HTML-CSS-JS Music Player</h1>
		<main class="app">
			<div class="content">
				<div class="handling">
					<div class="handling-sound" title="Volume">
						<img class="icon-sound" src="assets/images/volume.svg" alt="Volume">
						<div class="volume">
							<input type="range" name="volume" class="controls-volume" min="0" max="1" step="0.1"
								value="0.5">
						</div>
					</div>
					<div class="handling-repeat" title="Repeat">
						<img class="icon-sound" src="assets/images/repeat.svg" alt="Repeat">
					</div>
					<div class="handling-shuffle" title="Shuffle">
						<img class="icon-sound" src="assets/images/shuffle.svg" alt="Shuffle">
					</div>
				</div>
				<div class="current"></div>
				<div class="list">
					<p class="last-title">All tracks</p>
					<div class="items"></div>
				</div>
			</div>
		</main>
	</div>
	<script type="module" src="assets/js/main.js"></script>
</body>

</html>
